name: reuse workflow
on: workflow_dispatch

jobs:
  call_workflow:
    uses: ./.github/workflows/reusable.yml
    with:
      who-to-greet: '@javips'

  use-output:
    runs-on: ubuntu-latest
    needs: [call_workflow]
    steps:
      - run: echo "Time was ${{ needs.call_workflow.outputs.current-time }}"
