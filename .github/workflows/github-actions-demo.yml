name: GitHub Actions Demo
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: main
  schedule:
      - cron: 15 6 * * 0
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Output triggered event
        run: |
            echo "Triggered event: ${GITHUB_EVENT_NAME}"

      - name: Output current branch
        run: |
              echo "Current branch: ${GITHUB_HEAD_REF}"

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: List files
        run: |
          ls -R | grep -v / | sort
  
